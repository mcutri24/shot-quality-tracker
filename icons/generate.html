<!DOCTYPE html>
<html>
<body>
<canvas id="c" width="512" height="512"></canvas>
<script>
// Generate app icon as PNG
var sizes = [192, 512];
sizes.forEach(function(size) {
    var c = document.createElement('canvas');
    c.width = size; c.height = size;
    var ctx = c.getContext('2d');

    // Background
    ctx.fillStyle = '#0a0a12';
    ctx.beginPath();
    ctx.roundRect(0, 0, size, size, size * 0.18);
    ctx.fill();

    // Basketball circle
    var cx = size / 2, cy = size * 0.42, r = size * 0.22;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fillStyle = '#f97316';
    ctx.fill();
    ctx.strokeStyle = '#cc5500';
    ctx.lineWidth = size * 0.015;
    ctx.stroke();

    // Ball lines
    ctx.beginPath();
    ctx.moveTo(cx - r, cy);
    ctx.lineTo(cx + r, cy);
    ctx.strokeStyle = '#cc5500';
    ctx.lineWidth = size * 0.012;
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(cx, cy - r);
    ctx.lineTo(cx, cy + r);
    ctx.stroke();

    // Checkmark
    var checkSize = size * 0.15;
    var checkX = cx - checkSize * 0.3;
    var checkY = cy + r + size * 0.12;
    ctx.beginPath();
    ctx.moveTo(checkX - checkSize * 0.4, checkY);
    ctx.lineTo(checkX, checkY + checkSize * 0.4);
    ctx.lineTo(checkX + checkSize * 0.6, checkY - checkSize * 0.3);
    ctx.strokeStyle = '#22c55e';
    ctx.lineWidth = size * 0.035;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.stroke();

    // "SQT" text
    ctx.fillStyle = '#4a9eff';
    ctx.font = 'bold ' + (size * 0.1) + 'px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('SQT', cx, size * 0.92);

    // Download
    var link = document.createElement('a');
    link.download = 'icon-' + size + '.png';
    link.href = c.toDataURL('image/png');
    link.click();
});
document.body.innerHTML = '<h2>Icons downloaded! You can close this page.</h2>';
</script>
</body>
</html>
