<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>NA Shot Quality Tracker</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0c0c0e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/screens.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
<div id="app">

    <!-- ===== HOME SCREEN ===== -->
    <div id="home-screen" class="screen active">
        <div class="app-header">
            <img src="icons/na-logo.png" alt="NA" class="na-logo-img">
            <h1><span>Shot Quality</span> Tracker</h1>
            <div class="subtitle">Newark Academy Minutemen</div>
            <div class="active-season-label" id="home-season-name"></div>
        </div>
        <div class="season-record-card">
            <div class="label">Season Record</div>
            <div class="record">
                <span class="wins" id="season-wins">0</span><span class="sep">-</span><span class="losses" id="season-losses">0</span>
            </div>
            <div class="ppp" id="season-ppp">Season PPP: —</div>
        </div>
        <div class="home-menu">
            <button class="menu-btn" id="btn-new-game">
                <span class="icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 0 1 0 20"/><path d="M2 12h20"/><path d="M12 2c2.5 3 4 6.5 4 10s-1.5 7-4 10"/></svg></span>
                <span class="btn-label">New Game<br><span class="btn-sub">Start tracking a live game</span></span>
            </button>
            <button class="menu-btn" id="btn-roster">
                <span class="icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
                <span class="btn-label">Manage Roster<br><span class="btn-sub">Add or edit players</span></span>
            </button>
            <button class="menu-btn" id="btn-history">
                <span class="icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
                <span class="btn-label">Game History<br><span class="btn-sub">View past games</span></span>
            </button>
            <button class="menu-btn" id="btn-season">
                <span class="icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span>
                <span class="btn-label">Season Stats<br><span class="btn-sub">Aggregate analysis</span></span>
            </button>
            <button class="menu-btn" id="btn-seasons-mgr">
                <span class="icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><line x1="8" y1="7" x2="16" y2="7"/><line x1="8" y1="11" x2="14" y2="11"/></svg></span>
                <span class="btn-label">Seasons<br><span class="btn-sub">Manage &amp; view past seasons</span></span>
            </button>
        </div>
    </div>

    <!-- ===== ROSTER SCREEN ===== -->
    <div id="roster-screen" class="screen">
        <div class="top-bar">
            <button class="back-btn" id="roster-back">&larr; Back</button>
            <span class="title">Roster</span>
            <span style="width:50px"></span>
        </div>
        <div class="roster-list" id="roster-list"></div>
        <div class="add-player-bar">
            <input type="text" id="roster-num-input" class="number-input" placeholder="#" maxlength="3" inputmode="numeric">
            <input type="text" id="roster-name-input" placeholder="Player name">
            <button class="btn btn-primary" id="roster-add-btn">Add</button>
        </div>
    </div>

    <!-- ===== GAME SETUP SCREEN ===== -->
    <div id="setup-screen" class="screen">
        <div class="top-bar">
            <button class="back-btn" id="setup-back">&larr; Back</button>
            <span class="title">New Game</span>
            <span style="width:50px"></span>
        </div>
        <div class="setup-form">
            <div class="form-group">
                <label>Opponent</label>
                <input type="text" id="setup-opponent" placeholder="e.g. Millburn">
            </div>
            <div class="form-group">
                <label>Date</label>
                <input type="date" id="setup-date">
            </div>
            <div class="form-group">
                <label>Location</label>
                <div class="toggle-group">
                    <button class="active">Home</button>
                    <button>Away</button>
                </div>
            </div>
            <div style="flex:1"></div>
            <button class="btn btn-primary btn-block btn-lg" onclick="SQT.Game.startGame()">Start Game</button>
        </div>
    </div>

    <!-- ===== TRACKING SCREEN ===== -->
    <div id="tracking-screen" class="screen">
        <div class="tracking-top">
            <span class="game-info" id="tracking-game-info">vs Opponent</span>
            <div class="quarter-selector">
                <button class="active">Q1</button>
                <button>Q2</button>
                <button>Q3</button>
                <button>Q4</button>
                <button>OT</button>
            </div>
            <div class="mini-stats">
                <span>Poss: <span class="stat-val" id="mini-poss">0</span></span>
                <span>PTS: <span class="stat-val" id="mini-pts">0</span></span>
                <span>PPP: <span class="stat-val" id="mini-ppp">—</span></span>
                <span>FG: <span class="stat-val" id="mini-fg">—</span></span>
            </div>
        </div>
        <div class="tap-flow" id="tap-flow-area">
            <!-- Dynamic content rendered by tracker.js -->
        </div>
        <div class="tracking-bottom">
            <button id="tracking-undo-btn" class="bottom-btn undo-btn">Undo</button>
            <button id="tracking-playlist-btn" class="bottom-btn playlist-btn">Play List</button>
            <button id="tracking-dashboard-btn" class="bottom-btn stats-btn">Stats</button>
            <button id="tracking-end-btn" class="bottom-btn end-btn">End</button>
        </div>
    </div>

    <!-- ===== DASHBOARD SCREEN ===== -->
    <div id="dashboard-screen" class="screen">
        <div class="top-bar">
            <button class="back-btn" id="dashboard-back">&larr; Back</button>
            <span class="title" id="dashboard-title">Dashboard</span>
            <button class="action-btn" id="dashboard-export-btn">Export</button>
        </div>
        <div class="dashboard-tabs">
            <button data-tab="player" class="active">By Player</button>
            <button data-tab="type">By Type</button>
            <button data-tab="quarter">By Quarter</button>
            <button data-tab="grade">By Grade</button>
        </div>
        <div class="dashboard-content" id="dashboard-content"></div>
    </div>

    <!-- ===== POST-GAME SCREEN ===== -->
    <div id="postgame-screen" class="screen">
        <div class="top-bar">
            <span style="width:50px"></span>
            <span class="title">Game Over</span>
            <span style="width:50px"></span>
        </div>
        <div class="post-game-form">
            <div id="postgame-opponent" style="font-size:18px;color:var(--text-secondary);"></div>
            <div class="score-entry">
                <div class="score-team">
                    <div class="team-label" id="postgame-us-label">NA</div>
                    <input type="number" id="score-us" inputmode="numeric" placeholder="0">
                </div>
                <div class="vs">vs</div>
                <div class="score-team">
                    <div class="team-label" id="postgame-them-label">Them</div>
                    <input type="number" id="score-them" inputmode="numeric" placeholder="0">
                </div>
            </div>
            <button class="btn btn-primary btn-lg" onclick="SQT.Game.savePostGame()">Save Game</button>
        </div>
    </div>

    <!-- ===== GAME HISTORY SCREEN ===== -->
    <div id="history-screen" class="screen">
        <div class="top-bar">
            <button class="back-btn" id="history-back">&larr; Back</button>
            <span class="title">Game History</span>
            <span style="width:50px"></span>
        </div>
        <div class="history-list" id="history-list"></div>
    </div>

    <!-- ===== SEASON MANAGER SCREEN ===== -->
    <div id="seasons-screen" class="screen">
        <div class="top-bar">
            <button class="back-btn" id="seasons-back">&larr; Back</button>
            <span class="title">Seasons</span>
            <span style="width:50px"></span>
        </div>
        <div class="seasons-content" id="seasons-content"></div>
        <div class="seasons-bottom">
            <button class="btn btn-primary btn-block btn-lg" id="btn-new-season">+ New Season</button>
        </div>
    </div>

</div><!-- /app -->

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Scripts (order matters) -->
<script src="js/storage.js"></script>
<script src="js/roster.js"></script>
<script src="js/game.js"></script>
<script src="js/tracker.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/export.js"></script>
<script src="js/app.js"></script>

<!-- Export button binding -->
<script>
document.getElementById('dashboard-export-btn').addEventListener('click', function(e) {
    e.stopPropagation();
    // Show export options
    var menu = document.createElement('div');
    menu.style.cssText = 'position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.4);';
    menu.innerHTML = '<div style="background:var(--bg-secondary);border:1px solid var(--border);border-radius:12px;padding:16px;width:260px;display:flex;flex-direction:column;gap:8px;">' +
        '<div style="font-size:15px;font-weight:600;text-align:center;margin-bottom:4px;">Export Data</div>' +
        '<button class="btn btn-block" id="export-csv">Export as CSV (Excel)</button>' +
        '<button class="btn btn-block" id="export-json">Export as JSON</button>' +
        '<button class="btn btn-block" id="export-cancel" style="color:var(--text-secondary);">Cancel</button>' +
    '</div>';
    document.body.appendChild(menu);

    var game = SQT.Dashboard.game;
    document.getElementById('export-csv').addEventListener('click', function() {
        SQT.Export.exportCSV(game);
        document.body.removeChild(menu);
    });
    document.getElementById('export-json').addEventListener('click', function() {
        SQT.Export.exportJSON(game);
        document.body.removeChild(menu);
    });
    document.getElementById('export-cancel').addEventListener('click', function() {
        document.body.removeChild(menu);
    });
    menu.addEventListener('click', function(ev) {
        if (ev.target === menu) document.body.removeChild(menu);
    });
});
</script>
<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
}
</script>
</body>
</html>
